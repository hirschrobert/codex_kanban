name: CI

on:
  push:
    branches:
      - "release/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv sync --dev

      - name: Check formatting
        run: uv run black --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright

      - name: Check JavaScript syntax
        run: |
          node --check kanban_server/static/app/state.js
          node --check kanban_server/static/app/api.js
          node --check kanban_server/static/app/model.js
          node --check kanban_server/static/app/project-settings.js
          node --check kanban_server/static/app/archive-old.js
          node --check kanban_server/static/app/main.js

      - name: Compile Python
        run: uv run python -m compileall -q kanban_server tests

      - name: Run tests with ResourceWarnings as errors
        run: uv run python -Werror::ResourceWarning -m unittest discover -s tests
