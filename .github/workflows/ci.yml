name: CI

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --dev

      - name: Check formatting
        run: uv run black --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright

      - name: Check JavaScript syntax
        run: |
          node --check kanban_server/static/app.js
          node --check kanban_server/static/app_api.js
          node --check kanban_server/static/app_model.js
          node --check kanban_server/static/app_state.js

      - name: Compile Python
        run: uv run python -m compileall -q kanban_server tests

      - name: Run tests
        run: uv run python -m unittest discover -s tests

      - name: Run tests with ResourceWarnings as errors
        run: uv run python -Werror::ResourceWarning -m unittest discover -s tests
